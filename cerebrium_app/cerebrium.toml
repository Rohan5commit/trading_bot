[cerebrium.deployment]
name = "trading-bot-ai"
python_version = "3.11"
disable_auth = true
include = [
  "main.py",
  "requirements.txt",
  "trained_model_service_runtime.py",
  "llm_sentiment.py",
]
exclude = [".*", "__pycache__"]
use_uv = true
deployment_initialization_timeout = 830

[cerebrium.runtime.custom]
port = 8000
entrypoint = ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
healthcheck_endpoint = "/health"
readycheck_endpoint = "/health"

[cerebrium.hardware]
cpu = 4
memory = 32.0
compute = "AMPERE_A10"
gpu_count = 1
provider = "aws"
region = "us-east-1"

[cerebrium.scaling]
min_replicas = 0
max_replicas = 1
replica_concurrency = 1
response_grace_period = 3600
cooldown = 900
scaling_metric = "concurrency_utilization"
scaling_target = 100
evaluation_interval_seconds = 30
compute_tier = "on_demand"
roll_out_duration_seconds = 0

[cerebrium.dependencies.paths]
pip = "requirements.txt"
