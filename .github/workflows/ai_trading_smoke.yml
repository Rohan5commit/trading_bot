name: AI Trading Smoke

on:
  workflow_dispatch:

concurrency:
  group: ai-trading-smoke
  cancel-in-progress: true

jobs:
  ai-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      PYTHONUNBUFFERED: "1"
      TWELVEDATA_API_KEYS: ${{ secrets.TWELVEDATA_API_KEYS }}
      ALPHAVANTAGE_API_KEYS: ${{ secrets.ALPHAVANTAGE_API_KEYS }}
      NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
      TRAINED_MODEL_INFERENCE_URL: ${{ secrets.TRAINED_MODEL_INFERENCE_URL }}
      TRAINED_MODEL_API_KEY: ${{ secrets.TRAINED_MODEL_API_KEY }}
      TRAINED_MODEL_TIMEOUT_SECONDS: "1800"
      TRAINED_MODEL_MAX_RETRIES: "0"
      TRAINED_MODEL_BACKOFF_SECONDS: "5"
      TRAINED_MODEL_BATCH_SIZE: "1"
      AI_SMOKE_TICKERS: "AAPL"
      AI_SMOKE_USE_STATIC: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run AI-only smoke test
        run: |
          python run_ai_trading_smoke.py

      - name: Show AI smoke result
        if: always()
        run: |
          python - <<'PY'
          import glob
          import json
          from pathlib import Path

          paths = sorted(glob.glob("results/ai_smoke_*.json"))
          if not paths:
              print(json.dumps({"result": "missing"}, indent=2))
              raise SystemExit(0)
          latest = Path(paths[-1])
          print(latest.read_text())
          PY

      - name: Upload AI smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-trading-smoke
          path: |
            results/ai_smoke_*.json
          retention-days: 7
