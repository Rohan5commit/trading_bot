name: Daily Trading Bot

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

on:
  schedule:
    # Runs at 00:00 UTC (8:00 AM SGT) Tuesday-Saturday
    - cron: '0 0 * * 2-6'
  workflow_dispatch:
    inputs:
      run_in_lightning_studio:
        description: "Run the full daily job inside Lightning Studio with local trained-model inference"
        required: false
        default: false
        type: boolean
      disable_ai_trading:
        description: "Run only the core bot and skip AI trading"
        required: false
        default: false
        type: boolean
      disable_core_trading:
        description: "Run only the AI bot and skip Core trading"
        required: false
        default: false
        type: boolean
      reset_ai_positions:
        description: "Clear only AI positions before the manual run so the trained model must generate fresh trades"
        required: false
        default: false
        type: boolean
      core_cache_restore_key:
        description: "Optional exact Actions cache key for restoring core state (example: Linux-trading-bot-24061212677)"
        required: false
        default: ""
        type: string

jobs:
  run-trading-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    permissions:
      contents: read

    env:
      TZ: Asia/Singapore
      CEREBRIUM_INFERENCE_URL: ${{ secrets.CEREBRIUM_INFERENCE_URL }}
      CEREBRIUM_API_KEY: ${{ secrets.CEREBRIUM_API_KEY || secrets.TRAINED_MODEL_API_KEY }}
      TRAINED_MODEL_INFERENCE_URL: ${{ secrets.TRAINED_MODEL_INFERENCE_URL }}
      TRAINED_MODEL_API_KEY: ${{ secrets.TRAINED_MODEL_API_KEY }}
      TRAINED_MODEL_TIMEOUT_SECONDS: "300"
      TRAINED_MODEL_READY_TIMEOUT_SECONDS: "1200"
      TRAINED_MODEL_READY_POLL_SECONDS: "15"
      TRAINED_MODEL_MAX_RETRIES: "0"
      TRAINED_MODEL_BACKOFF_SECONDS: "5"
      TRAINED_MODEL_BATCH_SIZE: "4"
      LIGHTNING_USERNAME: ${{ secrets.LIGHTNING_USERNAME }}
      LIGHTNING_API_KEY: ${{ secrets.LIGHTNING_API_KEY }}
      LIGHTNING_USER_ID: ${{ secrets.LIGHTNING_USER_ID }}
      LIGHTNING_CLOUD_PROJECT_ID: "01kkqt8mzptzp8svph6p4nt915"
      GITHUB_TOKEN: ${{ github.token }}
      TRAINED_MODEL_BASE_MODEL: "Qwen/Qwen2.5-7B-Instruct"
      TRAINED_MODEL_NAME: "quant-trained-trading-model"
      TRAINED_MODEL_CPU_THREADS: "4"
      LIGHTNING_INFERENCE_COMPUTE_NAME: "cpu-4"
      LIGHTNING_INFERENCE_DISK_GB: "40"
      LIGHTNING_INFERENCE_PORT: "8000"
      TRAINED_MODEL_ADAPTER_ARCHIVE_URL: ${{ secrets.TRAINED_MODEL_ADAPTER_ARCHIVE_URL }}
      TRAINED_MODEL_ADAPTER_ARCHIVE_TOKEN: ${{ secrets.TRAINED_MODEL_ADAPTER_ARCHIVE_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        id: install_base_dependencies
        continue-on-error: true
        timeout-minutes: 20
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Send Base Dependency Failure Reports
        if: ${{ always() && !(github.event_name == 'workflow_dispatch' && inputs.run_in_lightning_studio) && steps.install_base_dependencies.outcome == 'failure' }}
        continue-on-error: true
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          RUN_URL: ${{ format('{0}/{1}/actions/runs/{2}', github.server_url, github.repository, github.run_id) }}
        run: |
          python send_failure_report.py \
            --strategy-tag Core \
            --source "Install dependencies" \
            --message "Base Python dependencies failed to install before the core daily job could start. Run: ${RUN_URL}"
          python send_failure_report.py \
            --strategy-tag AI \
            --source "Install dependencies" \
            --message "Base Python dependencies failed to install before the AI daily job could start. Run: ${RUN_URL}" \
            --model-used "quant-trained-trading-model"

      - name: Restore Core Cache (Exact Key)
        if: ${{ steps.install_base_dependencies.outcome == 'success' && !(github.event_name == 'workflow_dispatch' && inputs.run_in_lightning_studio) && github.event_name == 'workflow_dispatch' && inputs.core_cache_restore_key != '' }}
        id: restore_core_cache_exact
        uses: actions/cache/restore@v4
        with:
          path: |
            data/
            models/
            model_registry.json
          key: ${{ inputs.core_cache_restore_key }}

      - name: Verify Exact Core Cache Hit
        if: ${{ steps.install_base_dependencies.outcome == 'success' && !(github.event_name == 'workflow_dispatch' && inputs.run_in_lightning_studio) && github.event_name == 'workflow_dispatch' && inputs.core_cache_restore_key != '' }}
        run: |
          if [ "${{ steps.restore_core_cache_exact.outputs.cache-hit }}" != "true" ]; then
            echo "Exact cache key not found: ${{ inputs.core_cache_restore_key }}" >&2
            exit 1
          fi

      - name: Restore Data and Models Cache (Latest Prefix)
        if: ${{ steps.install_base_dependencies.outcome == 'success' && !(github.event_name == 'workflow_dispatch' && inputs.run_in_lightning_studio) && !(github.event_name == 'workflow_dispatch' && inputs.core_cache_restore_key != '') }}
        uses: actions/cache/restore@v4
        with:
          path: |
            data/
            models/
            model_registry.json
          key: ${{ runner.os }}-trading-bot-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-trading-bot-

      - name: Run Trading Bot
        id: run_core_bot
        if: ${{ steps.install_base_dependencies.outcome == 'success' && !(github.event_name == 'workflow_dispatch' && inputs.run_in_lightning_studio) && !inputs.disable_core_trading }}
        continue-on-error: true
        timeout-minutes: 45
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          TRAINED_MODEL_API_KEY: ${{ secrets.TRAINED_MODEL_API_KEY }}
          TWELVEDATA_API_KEYS: ${{ secrets.TWELVEDATA_API_KEYS }}
          ARM_LIVE_TRADING: ${{ secrets.ARM_LIVE_TRADING }}
          LOG_LEVEL: ${{ secrets.LOG_LEVEL }}
          DISABLE_AI_TRADING: "1"
        run: |
          python main.py daily_job

      - name: Send Core Failure Report
        if: ${{ always() && !(github.event_name == 'workflow_dispatch' && inputs.run_in_lightning_studio) && steps.run_core_bot.outcome == 'failure' && steps.run_core_bot_retry.outcome != 'success' }}
        continue-on-error: true
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          RUN_URL: ${{ format('{0}/{1}/actions/runs/{2}', github.server_url, github.repository, github.run_id) }}
        run: |
          python send_failure_report.py \
            --strategy-tag Core \
            --source "Run Trading Bot" \
            --message "Core daily job failed before sending its report email. Run: ${RUN_URL}"

      - name: Run Trading Bot (Core Retry)
        id: run_core_bot_retry
        if: ${{ always() && steps.install_base_dependencies.outcome == 'success' && !(github.event_name == 'workflow_dispatch' && inputs.run_in_lightning_studio) && !inputs.disable_core_trading && steps.run_core_bot.outcome == 'failure' }}
        continue-on-error: true
        timeout-minutes: 45
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          TRAINED_MODEL_API_KEY: ${{ secrets.TRAINED_MODEL_API_KEY }}
          TWELVEDATA_API_KEYS: ${{ secrets.TWELVEDATA_API_KEYS }}
          ARM_LIVE_TRADING: ${{ secrets.ARM_LIVE_TRADING }}
          LOG_LEVEL: ${{ secrets.LOG_LEVEL }}
          DISABLE_AI_TRADING: "1"
        run: |
          python main.py daily_job

      - name: Install Lightning dependencies
        id: install_lightning_deps
        if: ${{ steps.install_base_dependencies.outcome == 'success' && ((github.event_name == 'workflow_dispatch' && inputs.run_in_lightning_studio) || (github.event_name != 'workflow_dispatch') || (github.event_name == 'workflow_dispatch' && !inputs.disable_ai_trading)) }}
        continue-on-error: ${{ !(github.event_name == 'workflow_dispatch' && inputs.run_in_lightning_studio) }}
        timeout-minutes: 20
        run: |
          python -m pip install "lightning[app]==2.3.2" lightning-cloud==0.5.70

      - name: Plan AI runtime
        id: plan_ai_runtime
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.run_in_lightning_studio) && ((github.event_name != 'workflow_dispatch') || (github.event_name == 'workflow_dispatch' && !inputs.disable_ai_trading)) }}
        run: |
          mkdir -p results
          configured_inference_url="${CEREBRIUM_INFERENCE_URL}"
          if [ -z "${configured_inference_url}" ]; then
            configured_inference_url="${CEREBRIUM_TRAINED_MODEL_URL}"
          fi
          if [ -z "${configured_inference_url}" ]; then
            configured_inference_url="${TRAINED_MODEL_INFERENCE_URL}"
          fi
          if [ -n "${configured_inference_url}" ]; then
            runtime_mode="cerebrium_full"
            selected_backend="cerebrium_full"
            reason="cerebrium_primary_configured"
          else
            runtime_mode="distilled_local"
            selected_backend="distilled_local"
            reason="cerebrium_inference_url_missing"
          fi
          {
            echo "runtime_mode=${runtime_mode}"
            echo "selected_backend=${selected_backend}"
            echo "selected_compute_name="
            echo "selected_disk_gb=0"
            echo "reason=${reason}"
          } >> "$GITHUB_OUTPUT"
          python -c 'import json, os, pathlib; payload={"runtime_mode": os.environ["runtime_mode"], "selected_backend": os.environ["selected_backend"], "selected_compute_name": "", "selected_disk_gb": 0, "reason": os.environ["reason"], "preflight": {"router_policy": "cerebrium_primary_then_distilled"}}; pathlib.Path("results/ai_runtime_plan.json").write_text(json.dumps(payload, indent=2)+"\n", encoding="utf-8"); print(json.dumps(payload, indent=2))'
          cat results/ai_runtime_plan.json


      - name: Validate Cerebrium primary configuration
        id: validate_cerebrium_config
        if: ${{ steps.install_base_dependencies.outcome == 'success' && !(github.event_name == 'workflow_dispatch' && inputs.run_in_lightning_studio) && ((github.event_name != 'workflow_dispatch') || (github.event_name == 'workflow_dispatch' && !inputs.disable_ai_trading)) }}
        run: |
          configured_inference_url="${CEREBRIUM_INFERENCE_URL}"
          if [ -z "${configured_inference_url}" ]; then
            configured_inference_url="${CEREBRIUM_TRAINED_MODEL_URL}"
          fi
          if [ -z "${configured_inference_url}" ]; then
            configured_inference_url="${TRAINED_MODEL_INFERENCE_URL}"
          fi
          if [ -n "${configured_inference_url}" ]; then
            echo "has_inference_url=true" >> "$GITHUB_OUTPUT"
            echo "inference_url_source=configured"
          else
            echo "has_inference_url=false" >> "$GITHUB_OUTPUT"
            echo "inference_url_source=missing"
            echo "AI primary inference URL is missing across CEREBRIUM_INFERENCE_URL/CEREBRIUM_TRAINED_MODEL_URL/TRAINED_MODEL_INFERENCE_URL" >&2
          fi

      - name: Emit AI runtime decision
        if: ${{ steps.install_base_dependencies.outcome == 'success' && !(github.event_name == 'workflow_dispatch' && inputs.run_in_lightning_studio) && ((github.event_name != 'workflow_dispatch') || (github.event_name == 'workflow_dispatch' && !inputs.disable_ai_trading)) }}
        run: |
          echo "AI runtime mode: ${{ steps.plan_ai_runtime.outputs.runtime_mode }}"
          echo "AI backend: ${{ steps.plan_ai_runtime.outputs.selected_backend }}"
          echo "AI reason: ${{ steps.plan_ai_runtime.outputs.reason }}"
          echo "AI inference URL configured: ${{ steps.validate_cerebrium_config.outputs.has_inference_url }}"

      - name: Warm Cerebrium inference app
        id: warm_cerebrium_inference
        if: ${{ steps.install_base_dependencies.outcome == 'success' && !(github.event_name == 'workflow_dispatch' && inputs.run_in_lightning_studio) && ((github.event_name != 'workflow_dispatch') || (github.event_name == 'workflow_dispatch' && !inputs.disable_ai_trading)) && steps.plan_ai_runtime.outputs.runtime_mode == 'cerebrium_full' && steps.validate_cerebrium_config.outputs.has_inference_url == 'true' }}
        continue-on-error: true
        timeout-minutes: 45
        env:
          AI_PRIMARY_BACKEND: "cerebrium"
          CEREBRIUM_INFERENCE_URL: ${{ secrets.CEREBRIUM_INFERENCE_URL }}
          CEREBRIUM_API_KEY: ${{ secrets.CEREBRIUM_API_KEY || secrets.TRAINED_MODEL_API_KEY }}
          TRAINED_MODEL_MAX_RETRIES: "2"
          TRAINED_MODEL_BACKOFF_SECONDS: "10"
          TRAINED_MODEL_READY_TIMEOUT_SECONDS: "1800"
          TRAINED_MODEL_READY_POLL_SECONDS: "20"
          TRAINED_MODEL_TIMEOUT_SECONDS: "600"
        run: |
          python wait_for_trained_model.py
          python warm_trained_model.py

      - name: Verify Cerebrium predict endpoint
        id: verify_cerebrium_predict
        if: ${{ steps.install_base_dependencies.outcome == 'success' && !(github.event_name == 'workflow_dispatch' && inputs.run_in_lightning_studio) && ((github.event_name != 'workflow_dispatch') || (github.event_name == 'workflow_dispatch' && !inputs.disable_ai_trading)) && steps.plan_ai_runtime.outputs.runtime_mode == 'cerebrium_full' && steps.validate_cerebrium_config.outputs.has_inference_url == 'true' }}
        continue-on-error: true
        timeout-minutes: 3
        env:
          CEREBRIUM_INFERENCE_URL: ${{ secrets.CEREBRIUM_INFERENCE_URL }}
          CEREBRIUM_API_KEY: ${{ secrets.CEREBRIUM_API_KEY || secrets.TRAINED_MODEL_API_KEY }}
        run: |
          python - <<'PYCODE'
          import json, os, requests
          url = (os.getenv('CEREBRIUM_INFERENCE_URL') or '').strip()
          if not url:
              raise SystemExit('CEREBRIUM_INFERENCE_URL is empty')
          payload = {
              'task': 'trade_signal_classification',
              'candidates': [{'symbol':'AAPL','as_of_date':'2026-05-13','return_1d':0.01,'return_5d':0.02,'return_10d':0.03,'volatility_20d':0.02,'dist_ma_20':0.01,'dist_ma_50':0.02,'rsi_14':55,'volume_ratio':1.1,'news_count_7d':1,'news_sentiment_7d':0.1}]
          }
          headers = {'Content-Type':'application/json','Accept':'application/json'}
          key = (os.getenv('CEREBRIUM_API_KEY') or '').strip()
          if key:
              headers['Authorization'] = f'Bearer {key}'
          candidate_urls = [url]
          if url.rstrip('/').endswith('/predict_trade_candidates'):
              candidate_urls.append(url[: -len('/predict_trade_candidates')])
          else:
              candidate_urls.append(url.rstrip('/') + '/predict_trade_candidates')

          last_error = None
          max_attempts = 3
          preflight_ok = False
          for test_url in candidate_urls:
              for attempt in range(1, max_attempts + 1):
                  try:
                      r = requests.post(test_url, json=payload, headers=headers, timeout=45)
                      print('preflight url', test_url, 'attempt', attempt)
                      print('status', r.status_code)
                      print((r.text or '')[:500])
                      r.raise_for_status()
                      data = r.json()
                      if not isinstance(data, dict):
                          raise SystemExit('Predict response was not JSON object')
                      has_signals = isinstance(data.get('signals'), list)
                      has_signal = data.get('signal') is not None
                      if not (has_signals or has_signal):
                          raise SystemExit('Predict response missing signal/signals')
                      print('predict preflight ok')
                      preflight_ok = True
                      break
                  except Exception as exc:
                      last_error = exc
                      print('preflight attempt failed:', exc)
                      if attempt < max_attempts:
                          import time
                          time.sleep(10 * attempt)
              if preflight_ok:
                  break
          if not preflight_ok:
              raise SystemExit(f'Predict preflight failed for all candidate URLs: {last_error}')
          PYCODE

      - name: Run AI Trading Bot on Cerebrium
        id: run_ai_bot_cerebrium
        if: ${{ steps.install_base_dependencies.outcome == 'success' && !(github.event_name == 'workflow_dispatch' && inputs.run_in_lightning_studio) && ((github.event_name != 'workflow_dispatch') || (github.event_name == 'workflow_dispatch' && !inputs.disable_ai_trading)) && steps.plan_ai_runtime.outputs.runtime_mode == 'cerebrium_full' && steps.validate_cerebrium_config.outputs.has_inference_url == 'true' && steps.verify_cerebrium_predict.outcome == 'success' }}
        continue-on-error: true
        timeout-minutes: 90
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          CEREBRIUM_INFERENCE_URL: ${{ secrets.CEREBRIUM_INFERENCE_URL }}
          CEREBRIUM_API_KEY: ${{ secrets.CEREBRIUM_API_KEY || secrets.TRAINED_MODEL_API_KEY }}
          TRAINED_MODEL_API_KEY: ${{ secrets.TRAINED_MODEL_API_KEY }}
          TWELVEDATA_API_KEYS: ${{ secrets.TWELVEDATA_API_KEYS }}
          ARM_LIVE_TRADING: ${{ secrets.ARM_LIVE_TRADING }}
          LOG_LEVEL: ${{ secrets.LOG_LEVEL }}
          DISABLE_CORE_TRADING: "1"
          AI_RUNTIME_MODE: "full"
          AI_PRIMARY_BACKEND: "cerebrium"
          AI_ROUTER_REASON: ${{ steps.plan_ai_runtime.outputs.reason }}
          AI_PROMPT_CANDIDATES_LIMIT: "200"
          TRAINED_MODEL_TIMEOUT_SECONDS: "600"
          TRAINED_MODEL_READY_TIMEOUT_SECONDS: "1800"
          TRAINED_MODEL_READY_POLL_SECONDS: "20"
          TRAINED_MODEL_MAX_RETRIES: "2"
          TRAINED_MODEL_BACKOFF_SECONDS: "10"
          TRAINED_MODEL_BATCH_SIZE: "4"
        run: |
          python main.py daily_job

      - name: Run AI Trading Bot on Cerebrium (Retry)
        id: run_ai_bot_cerebrium_retry
        if: ${{ always() && steps.install_base_dependencies.outcome == 'success' && !(github.event_name == 'workflow_dispatch' && inputs.run_in_lightning_studio) && ((github.event_name != 'workflow_dispatch') || (github.event_name == 'workflow_dispatch' && !inputs.disable_ai_trading)) && steps.plan_ai_runtime.outputs.runtime_mode == 'cerebrium_full' && steps.validate_cerebrium_config.outputs.has_inference_url == 'true' && steps.verify_cerebrium_predict.outcome == 'success' && steps.run_ai_bot_cerebrium.outcome == 'failure' }}
        continue-on-error: true
        timeout-minutes: 90
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          CEREBRIUM_INFERENCE_URL: ${{ secrets.CEREBRIUM_INFERENCE_URL }}
          CEREBRIUM_API_KEY: ${{ secrets.CEREBRIUM_API_KEY || secrets.TRAINED_MODEL_API_KEY }}
          TRAINED_MODEL_API_KEY: ${{ secrets.TRAINED_MODEL_API_KEY }}
          TWELVEDATA_API_KEYS: ${{ secrets.TWELVEDATA_API_KEYS }}
          ARM_LIVE_TRADING: ${{ secrets.ARM_LIVE_TRADING }}
          LOG_LEVEL: ${{ secrets.LOG_LEVEL }}
          DISABLE_CORE_TRADING: "1"
          AI_RUNTIME_MODE: "full"
          AI_PRIMARY_BACKEND: "cerebrium"
          AI_ROUTER_REASON: "cerebrium_retry_after_failure"
          AI_PROMPT_CANDIDATES_LIMIT: "200"
          TRAINED_MODEL_TIMEOUT_SECONDS: "600"
          TRAINED_MODEL_READY_TIMEOUT_SECONDS: "1800"
          TRAINED_MODEL_READY_POLL_SECONDS: "20"
          TRAINED_MODEL_MAX_RETRIES: "2"
          TRAINED_MODEL_BACKOFF_SECONDS: "10"
          TRAINED_MODEL_BATCH_SIZE: "4"
        run: |
          python main.py daily_job

      - name: Launch Lightning inference studio
        id: launch_lightning_inference
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.run_in_lightning_studio) && ((github.event_name != 'workflow_dispatch') || (github.event_name == 'workflow_dispatch' && !inputs.disable_ai_trading)) && steps.plan_ai_runtime.outputs.runtime_mode == 'lightning_full' && steps.install_lightning_deps.outcome == 'success' }}
        continue-on-error: true
        timeout-minutes: 60
        env:
          TRAINED_MODEL_API_KEY: ${{ secrets.TRAINED_MODEL_API_KEY }}
          TRAINED_MODEL_CPU_THREADS: "8"
          LIGHTNING_INFERENCE_COMPUTE_NAME: ${{ steps.plan_ai_runtime.outputs.selected_compute_name }}
          LIGHTNING_INFERENCE_DISK_GB: ${{ steps.plan_ai_runtime.outputs.selected_disk_gb }}
        run: |
          python launch_lightning_inference_studio.py \
            --config quant_platform/configs/lightning_inference_studio.yaml \
            --allow-create \
            --skip-public-health-check \
            --status-out lightning-inference-status-local.json

      - name: Launch Lightning inference studio (manual full-studio mode)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_in_lightning_studio }}
        env:
          TRAINED_MODEL_API_KEY: ${{ secrets.TRAINED_MODEL_API_KEY }}
          TRAINED_MODEL_CPU_THREADS: "4"
        run: |
          python launch_lightning_inference_studio.py \
            --config quant_platform/configs/lightning_inference_studio.yaml \
            --allow-create \
            --skip-public-health-check \
            --status-out lightning-inference-status-local.json

      - name: Run AI Trading Bot in Lightning Studio
        id: run_ai_bot_in_lightning_studio
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.run_in_lightning_studio) && ((github.event_name != 'workflow_dispatch') || (github.event_name == 'workflow_dispatch' && !inputs.disable_ai_trading)) && steps.plan_ai_runtime.outputs.runtime_mode == 'lightning_full' && steps.install_lightning_deps.outcome == 'success' && steps.launch_lightning_inference.outcome == 'success' }}
        continue-on-error: true
        timeout-minutes: 90
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          TRAINED_MODEL_API_KEY: ${{ secrets.TRAINED_MODEL_API_KEY }}
          TWELVEDATA_API_KEYS: ${{ secrets.TWELVEDATA_API_KEYS }}
          ARM_LIVE_TRADING: ${{ secrets.ARM_LIVE_TRADING }}
          LOG_LEVEL: ${{ secrets.LOG_LEVEL }}
          DISABLE_CORE_TRADING: "1"
          AI_RUNTIME_MODE: "full"
          AI_ROUTER_REASON: ${{ steps.plan_ai_runtime.outputs.reason }}
          AI_PROMPT_CANDIDATES_LIMIT: "200"
          TRAINED_MODEL_TIMEOUT_SECONDS: "300"
          TRAINED_MODEL_READY_TIMEOUT_SECONDS: "1200"
          TRAINED_MODEL_READY_POLL_SECONDS: "15"
          TRAINED_MODEL_MAX_RETRIES: "0"
          TRAINED_MODEL_BATCH_SIZE: "4"
          TRAINED_MODEL_WARMUP_TIMEOUT_SECONDS: "1800"
          TRAINED_MODEL_CPU_THREADS: "8"
          TRAINED_MODEL_CLASS_TOKEN_INFERENCE: "1"
        run: |
          python run_daily_job_lightning_studio.py \
            --config quant_platform/configs/lightning_inference_studio.yaml \
            --result-out results/daily_job_lightning_studio.json \
            --session-name trading-bot-ai-daily-job-${{ github.run_id }} \
            --timeout-seconds 5100

      - name: Run AI Trading Bot (Distilled Local Fallback)
        id: run_ai_bot_distilled_local
        if: ${{ steps.install_base_dependencies.outcome == 'success' && !(github.event_name == 'workflow_dispatch' && inputs.run_in_lightning_studio) && ((github.event_name != 'workflow_dispatch') || (github.event_name == 'workflow_dispatch' && !inputs.disable_ai_trading)) && (steps.plan_ai_runtime.outputs.runtime_mode == 'distilled_local' || (steps.plan_ai_runtime.outputs.runtime_mode == 'cerebrium_full' && steps.validate_cerebrium_config.outputs.has_inference_url == 'true' && (steps.warm_cerebrium_inference.outcome == 'failure' || steps.verify_cerebrium_predict.outcome == 'failure' || (steps.run_ai_bot_cerebrium.outcome == 'failure' && steps.run_ai_bot_cerebrium_retry.outcome != 'success'))) || (steps.plan_ai_runtime.outputs.runtime_mode == 'lightning_full' && (steps.launch_lightning_inference.outcome == 'failure' || steps.run_ai_bot_in_lightning_studio.outcome == 'failure'))) }}
        continue-on-error: true
        timeout-minutes: 60
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          TRAINED_MODEL_API_KEY: ${{ secrets.TRAINED_MODEL_API_KEY }}
          TWELVEDATA_API_KEYS: ${{ secrets.TWELVEDATA_API_KEYS }}
          ARM_LIVE_TRADING: ${{ secrets.ARM_LIVE_TRADING }}
          LOG_LEVEL: ${{ secrets.LOG_LEVEL }}
          DISABLE_CORE_TRADING: "1"
          AI_RUNTIME_MODE: "distilled_local"
          AI_ROUTER_REASON: ${{ steps.plan_ai_runtime.outputs.runtime_mode == 'cerebrium_full' && steps.validate_cerebrium_config.outputs.has_inference_url == 'true' && 'distilled_after_cerebrium_failure' || (steps.plan_ai_runtime.outputs.runtime_mode == 'lightning_full' && 'distilled_after_lightning_failure' || steps.plan_ai_runtime.outputs.reason) }}
        run: |
          python quant_platform/scripts/prepare_ai_only_retry.py --results-dir results
          python main.py daily_job

      - name: Run AI Trading Bot (Emergency Distilled Retry)
        id: run_ai_bot_distilled_retry
        if: ${{ always() && steps.install_base_dependencies.outcome == 'success' && !(github.event_name == 'workflow_dispatch' && inputs.run_in_lightning_studio) && ((github.event_name != 'workflow_dispatch') || (github.event_name == 'workflow_dispatch' && !inputs.disable_ai_trading)) && steps.run_ai_bot_distilled_local.outcome == 'failure' }}
        continue-on-error: true
        timeout-minutes: 60
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          TRAINED_MODEL_API_KEY: ${{ secrets.TRAINED_MODEL_API_KEY }}
          TWELVEDATA_API_KEYS: ${{ secrets.TWELVEDATA_API_KEYS }}
          ARM_LIVE_TRADING: ${{ secrets.ARM_LIVE_TRADING }}
          LOG_LEVEL: ${{ secrets.LOG_LEVEL }}
          DISABLE_CORE_TRADING: "1"
          AI_RUNTIME_MODE: "distilled_local"
          AI_ROUTER_REASON: "distilled_emergency_retry_after_failure"
          TRAINED_MODEL_TIMEOUT_SECONDS: "450"
          TRAINED_MODEL_MAX_RETRIES: "1"
        run: |
          python quant_platform/scripts/prepare_ai_only_retry.py --results-dir results
          python main.py daily_job

      - name: Send AI Failure Report
        if: ${{ always() && !(github.event_name == 'workflow_dispatch' && inputs.run_in_lightning_studio) && ((github.event_name != 'workflow_dispatch') || (github.event_name == 'workflow_dispatch' && !inputs.disable_ai_trading)) && (((steps.plan_ai_runtime.outputs.runtime_mode == 'cerebrium_full' && steps.validate_cerebrium_config.outputs.has_inference_url == 'true') && (steps.warm_cerebrium_inference.outcome == 'failure' || steps.verify_cerebrium_predict.outcome == 'failure' || (steps.run_ai_bot_cerebrium.outcome == 'failure' && steps.run_ai_bot_cerebrium_retry.outcome != 'success')) && steps.run_ai_bot_distilled_local.outcome == 'failure' && steps.run_ai_bot_distilled_retry.outcome != 'success') || ((steps.plan_ai_runtime.outputs.runtime_mode == 'lightning_full') && (steps.launch_lightning_inference.outcome == 'failure' || steps.run_ai_bot_in_lightning_studio.outcome == 'failure') && steps.run_ai_bot_distilled_local.outcome == 'failure' && steps.run_ai_bot_distilled_retry.outcome != 'success') || ((steps.plan_ai_runtime.outputs.runtime_mode == 'distilled_local') && steps.run_ai_bot_distilled_local.outcome == 'failure' && steps.run_ai_bot_distilled_retry.outcome != 'success')) }}
        continue-on-error: true
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          RUN_URL: ${{ format('{0}/{1}/actions/runs/{2}', github.server_url, github.repository, github.run_id) }}
          AI_RUNTIME_MODE: ${{ steps.plan_ai_runtime.outputs.runtime_mode }}
          AI_RUNTIME_REASON: ${{ steps.plan_ai_runtime.outputs.reason }}
          LAUNCH_LIGHTNING_OUTCOME: ${{ steps.launch_lightning_inference.outcome }}
          RUN_AI_STUDIO_OUTCOME: ${{ steps.run_ai_bot_in_lightning_studio.outcome }}
          WARM_CEREBRIUM_OUTCOME: ${{ steps.warm_cerebrium_inference.outcome }}
          VERIFY_CEREBRIUM_OUTCOME: ${{ steps.verify_cerebrium_predict.outcome }}
          RUN_AI_CEREBRIUM_OUTCOME: ${{ steps.run_ai_bot_cerebrium.outcome }}
          RUN_AI_CEREBRIUM_RETRY_OUTCOME: ${{ steps.run_ai_bot_cerebrium_retry.outcome }}
          RUN_AI_DISTILLED_OUTCOME: ${{ steps.run_ai_bot_distilled_local.outcome }}
          RUN_AI_DISTILLED_RETRY_OUTCOME: ${{ steps.run_ai_bot_distilled_retry.outcome }}
        run: |
          source_step="Run AI Trading Bot"
          detail="AI daily job failed before sending its report email. Run: ${RUN_URL}"
          if [ "${AI_RUNTIME_MODE}" = "cerebrium_full" ]; then
            source_step="Run AI Trading Bot (Distilled Local Fallback)"
            detail="AI Cerebrium full-model runtime failed and the distilled fallback also failed. Run: ${RUN_URL}"
          elif [ "${AI_RUNTIME_MODE}" = "lightning_full" ]; then
            source_step="Run AI Trading Bot (Distilled Local Fallback)"
            detail="AI full-model runtime failed and the distilled fallback also failed. Run: ${RUN_URL}"
          else
            source_step="Run AI Trading Bot (Distilled Local Fallback)"
            detail="AI distilled fallback runtime failed (${AI_RUNTIME_REASON}). Run: ${RUN_URL}"
          fi
          python send_failure_report.py \
            --strategy-tag AI \
            --source "${source_step}" \
            --message "${detail}" \
            --model-used "quant-trained-trading-model"

      - name: Run Trading Bot in Lightning Studio
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_in_lightning_studio }}
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          TRAINED_MODEL_API_KEY: ${{ secrets.TRAINED_MODEL_API_KEY }}
          TWELVEDATA_API_KEYS: ${{ secrets.TWELVEDATA_API_KEYS }}
          ARM_LIVE_TRADING: ${{ secrets.ARM_LIVE_TRADING }}
          LOG_LEVEL: ${{ secrets.LOG_LEVEL }}
          RESET_AI_POSITIONS: ${{ github.event_name == 'workflow_dispatch' && inputs.reset_ai_positions || 'false' }}
          TRAINED_MODEL_TIMEOUT_SECONDS: "300"
          TRAINED_MODEL_READY_TIMEOUT_SECONDS: "1200"
          TRAINED_MODEL_READY_POLL_SECONDS: "15"
          TRAINED_MODEL_MAX_RETRIES: "0"
          TRAINED_MODEL_BATCH_SIZE: "4"
          TRAINED_MODEL_WARMUP_TIMEOUT_SECONDS: "1800"
          TRAINED_MODEL_CPU_THREADS: "4"
          TRAINED_MODEL_CLASS_TOKEN_INFERENCE: "1"
          AI_PROMPT_CANDIDATES_LIMIT: "200"
        run: |
          extra_args=""
          if [ "${RESET_AI_POSITIONS}" = "true" ]; then
            extra_args="--reset-ai-positions"
          fi
          python run_daily_job_lightning_studio.py \
            --config quant_platform/configs/lightning_inference_studio.yaml \
            --result-out results/daily_job_lightning_studio.json \
            --session-name trading-bot-daily-job-${{ github.run_id }} \
            --timeout-seconds 5100 \
            ${extra_args}

      - name: Generate Project Storage Report
        if: ${{ always() }}
        continue-on-error: true
        run: |
          mkdir -p results
          python quant_platform/scripts/report_project_storage.py --json-out results/project_storage_report.json

      - name: Upload artifacts (logs/reports)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bot-results
          path: |
            results/*.csv
            results/*.json
            *.log
            lightning-inference-status-local.json
          retention-days: 7

      - name: Save Data and Models Cache
        if: ${{ always() && !(github.event_name == 'workflow_dispatch' && inputs.run_in_lightning_studio) }}
        uses: actions/cache/save@v4
        with:
          path: |
            data/
            models/
            model_registry.json
          key: ${{ runner.os }}-trading-bot-${{ github.run_id }}


      - name: Ensure Daily Email Coverage
        if: ${{ always() && !(github.event_name == 'workflow_dispatch' && inputs.run_in_lightning_studio) }}
        continue-on-error: true
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          RUN_URL: ${{ format('{0}/{1}/actions/runs/{2}', github.server_url, github.repository, github.run_id) }}
          CORE_EXPECTED: ${{ (github.event_name != 'workflow_dispatch') || (github.event_name == 'workflow_dispatch' && !inputs.disable_core_trading) }}
          AI_EXPECTED: ${{ (github.event_name != 'workflow_dispatch') || (github.event_name == 'workflow_dispatch' && !inputs.disable_ai_trading) }}
          BASE_DEPS_OUTCOME: ${{ steps.install_base_dependencies.outcome }}
          CORE_OUTCOME: ${{ steps.run_core_bot.outcome }}
          CORE_RETRY_OUTCOME: ${{ steps.run_core_bot_retry.outcome }}
          AI_RUNTIME_MODE: ${{ steps.plan_ai_runtime.outputs.runtime_mode }}
          RUN_AI_CEREBRIUM_OUTCOME: ${{ steps.run_ai_bot_cerebrium.outcome }}
          RUN_AI_CEREBRIUM_RETRY_OUTCOME: ${{ steps.run_ai_bot_cerebrium_retry.outcome }}
          RUN_AI_STUDIO_OUTCOME: ${{ steps.run_ai_bot_in_lightning_studio.outcome }}
          RUN_AI_DISTILLED_OUTCOME: ${{ steps.run_ai_bot_distilled_local.outcome }}
          RUN_AI_DISTILLED_RETRY_OUTCOME: ${{ steps.run_ai_bot_distilled_retry.outcome }}
        run: |
          core_ok="false"
          ai_ok="false"

          if [ "${CORE_EXPECTED}" = "false" ]; then
            core_ok="true"
          elif [ "${CORE_OUTCOME}" = "success" -o "${CORE_RETRY_OUTCOME}" = "success" ]; then
            core_ok="true"
          fi

          if [ "${AI_EXPECTED}" = "false" ]; then
            ai_ok="true"
          elif [ "${AI_RUNTIME_MODE}" = "cerebrium_full" ] && [ "${RUN_AI_CEREBRIUM_OUTCOME}" = "success" -o "${RUN_AI_CEREBRIUM_RETRY_OUTCOME}" = "success" -o "${RUN_AI_DISTILLED_OUTCOME}" = "success" -o "${RUN_AI_DISTILLED_RETRY_OUTCOME}" = "success" ]; then
            ai_ok="true"
          elif [ "${AI_RUNTIME_MODE}" = "lightning_full" ] && [ "${RUN_AI_STUDIO_OUTCOME}" = "success" -o "${RUN_AI_DISTILLED_OUTCOME}" = "success" -o "${RUN_AI_DISTILLED_RETRY_OUTCOME}" = "success" ]; then
            ai_ok="true"
          elif [ "${AI_RUNTIME_MODE}" = "distilled_local" ] && [ "${RUN_AI_DISTILLED_OUTCOME}" = "success" -o "${RUN_AI_DISTILLED_RETRY_OUTCOME}" = "success" ]; then
            ai_ok="true"
          fi

          if [ "${BASE_DEPS_OUTCOME}" != "success" ]; then
            # Base dependency failure reports are emitted earlier; do not duplicate here.
            exit 0
          fi

          if [ "${core_ok}" != "true" ]; then
            python send_failure_report.py \
              --strategy-tag Core \
              --source "Email Coverage Guard" \
              --message "Core report email was not confirmed from workflow outcomes. Run: ${RUN_URL}"
          fi

          if [ "${ai_ok}" != "true" ]; then
            python send_failure_report.py \
              --strategy-tag AI \
              --source "Email Coverage Guard" \
              --message "AI report email was not confirmed from workflow outcomes (fallback may also have failed). Run: ${RUN_URL}" \
              --model-used "quant-trained-trading-model"
          fi

      - name: Evaluate Scheduled/Runner Run Status
        if: ${{ always() && !(github.event_name == 'workflow_dispatch' && inputs.run_in_lightning_studio) }}
        env:
          BASE_DEPS_OUTCOME: ${{ steps.install_base_dependencies.outcome }}
          CORE_OUTCOME: ${{ steps.run_core_bot.outcome }}
          CORE_RETRY_OUTCOME: ${{ steps.run_core_bot_retry.outcome }}
          CORE_EXPECTED: ${{ (github.event_name != 'workflow_dispatch') || (github.event_name == 'workflow_dispatch' && !inputs.disable_core_trading) }}
          AI_EXPECTED: ${{ (github.event_name != 'workflow_dispatch') || (github.event_name == 'workflow_dispatch' && !inputs.disable_ai_trading) }}
          INSTALL_LIGHTNING_OUTCOME: ${{ steps.install_lightning_deps.outcome }}
          AI_RUNTIME_MODE: ${{ steps.plan_ai_runtime.outputs.runtime_mode }}
          LAUNCH_LIGHTNING_OUTCOME: ${{ steps.launch_lightning_inference.outcome }}
          RUN_AI_STUDIO_OUTCOME: ${{ steps.run_ai_bot_in_lightning_studio.outcome }}
          WARM_CEREBRIUM_OUTCOME: ${{ steps.warm_cerebrium_inference.outcome }}
          VERIFY_CEREBRIUM_OUTCOME: ${{ steps.verify_cerebrium_predict.outcome }}
          RUN_AI_CEREBRIUM_OUTCOME: ${{ steps.run_ai_bot_cerebrium.outcome }}
          RUN_AI_CEREBRIUM_RETRY_OUTCOME: ${{ steps.run_ai_bot_cerebrium_retry.outcome }}
          RUN_AI_DISTILLED_OUTCOME: ${{ steps.run_ai_bot_distilled_local.outcome }}
          RUN_AI_DISTILLED_RETRY_OUTCOME: ${{ steps.run_ai_bot_distilled_retry.outcome }}
        run: |
          rc=0
          if [ "${BASE_DEPS_OUTCOME}" != "success" ]; then
            echo "Base dependency install failed: ${BASE_DEPS_OUTCOME}"
            rc=1
          fi
          if [ "${BASE_DEPS_OUTCOME}" = "success" ] && [ "${CORE_EXPECTED}" = "true" ] && [ "${CORE_OUTCOME}" != "success" ] && [ "${CORE_RETRY_OUTCOME}" != "success" ]; then
            echo "Core path failed: initial=${CORE_OUTCOME}, retry=${CORE_RETRY_OUTCOME}"
            rc=1
          fi
          if [ "${BASE_DEPS_OUTCOME}" = "success" ] && [ "${AI_EXPECTED}" = "true" ]; then
            if [ "${AI_RUNTIME_MODE}" = "cerebrium_full" ]; then
              if [ "${WARM_CEREBRIUM_OUTCOME}" != "success" ]; then
                echo "Cerebrium warmup failed: ${WARM_CEREBRIUM_OUTCOME}"
                if [ "${RUN_AI_DISTILLED_OUTCOME}" != "success" ] && [ "${RUN_AI_DISTILLED_RETRY_OUTCOME}" != "success" ]; then
                  rc=1
                fi
              fi
              if [ "${WARM_CEREBRIUM_OUTCOME}" = "success" ] && [ "${VERIFY_CEREBRIUM_OUTCOME}" != "success" ]; then
                echo "Cerebrium predict preflight failed: ${VERIFY_CEREBRIUM_OUTCOME}"
                if [ "${RUN_AI_DISTILLED_OUTCOME}" != "success" ] && [ "${RUN_AI_DISTILLED_RETRY_OUTCOME}" != "success" ]; then
                  rc=1
                fi
              fi
              if [ "${WARM_CEREBRIUM_OUTCOME}" = "success" ] && [ "${VERIFY_CEREBRIUM_OUTCOME}" = "success" ] && [ "${RUN_AI_CEREBRIUM_OUTCOME}" != "success" ] && [ "${RUN_AI_CEREBRIUM_RETRY_OUTCOME}" != "success" ]; then
                echo "AI Cerebrium run failed: initial=${RUN_AI_CEREBRIUM_OUTCOME}, retry=${RUN_AI_CEREBRIUM_RETRY_OUTCOME}"
                if [ "${RUN_AI_DISTILLED_OUTCOME}" != "success" ] && [ "${RUN_AI_DISTILLED_RETRY_OUTCOME}" != "success" ]; then
                  rc=1
                fi
              fi
            elif [ "${AI_RUNTIME_MODE}" = "lightning_full" ]; then
              if [ "${INSTALL_LIGHTNING_OUTCOME}" != "success" ]; then
                echo "Lightning dependency install failed: ${INSTALL_LIGHTNING_OUTCOME}"
                if [ "${RUN_AI_DISTILLED_OUTCOME}" != "success" ] && [ "${RUN_AI_DISTILLED_RETRY_OUTCOME}" != "success" ]; then
                  rc=1
                fi
              fi
              if [ "${LAUNCH_LIGHTNING_OUTCOME}" != "success" ]; then
                echo "Lightning launch failed: ${LAUNCH_LIGHTNING_OUTCOME}"
                if [ "${RUN_AI_DISTILLED_OUTCOME}" != "success" ] && [ "${RUN_AI_DISTILLED_RETRY_OUTCOME}" != "success" ]; then
                  rc=1
                fi
              fi
              if [ "${LAUNCH_LIGHTNING_OUTCOME}" = "success" ] && [ "${RUN_AI_STUDIO_OUTCOME}" != "success" ]; then
                echo "AI studio run failed: ${RUN_AI_STUDIO_OUTCOME}"
                if [ "${RUN_AI_DISTILLED_OUTCOME}" != "success" ] && [ "${RUN_AI_DISTILLED_RETRY_OUTCOME}" != "success" ]; then
                  rc=1
                fi
              fi
            else
              if [ "${RUN_AI_DISTILLED_OUTCOME}" != "success" ] && [ "${RUN_AI_DISTILLED_RETRY_OUTCOME}" != "success" ]; then
                echo "AI distilled fallback run failed: ${RUN_AI_DISTILLED_OUTCOME}, retry: ${RUN_AI_DISTILLED_RETRY_OUTCOME}"
                rc=1
              fi
            fi
          fi
          exit "${rc}"
