name: Daily Trading Bot

on:
  schedule:
    # Runs at 00:00 UTC (8:00 AM SGT) Tuesday-Saturday
    - cron: '0 0 * * 2-6'
  workflow_dispatch:

jobs:
  run-trading-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed if we want to commit changes (e.g. database updates, logs)

    env:
      TZ: Asia/Singapore
      LIGHTNING_USERNAME: ${{ secrets.LIGHTNING_USERNAME }}
      LIGHTNING_API_KEY: ${{ secrets.LIGHTNING_API_KEY }}
      LIGHTNING_USER_ID: ${{ secrets.LIGHTNING_USER_ID }}
      LIGHTNING_CLOUD_PROJECT_ID: "01kkqt8mzptzp8svph6p4nt915"
      GITHUB_TOKEN: ${{ github.token }}
      TRAINED_MODEL_BASE_MODEL: "Qwen/Qwen2.5-7B-Instruct"
      TRAINED_MODEL_NAME: "quant-trained-trading-model"
      TRAINED_MODEL_CPU_THREADS: "8"
      LIGHTNING_INFERENCE_COMPUTE_NAME: "cpu-4"
      LIGHTNING_INFERENCE_DISK_GB: "80"
      LIGHTNING_INFERENCE_PORT: "8000"
      TRAINED_MODEL_API_KEY: ${{ secrets.TRAINED_MODEL_API_KEY }}
      TRAINED_MODEL_ADAPTER_ARCHIVE_URL: ${{ secrets.TRAINED_MODEL_ADAPTER_ARCHIVE_URL }}
      TRAINED_MODEL_ADAPTER_ARCHIVE_TOKEN: ${{ secrets.TRAINED_MODEL_ADAPTER_ARCHIVE_TOKEN }}
      TRAINED_MODEL_READY_TIMEOUT_SECONDS: "1200"
      TRAINED_MODEL_READY_POLL_SECONDS: "15"
      TRAINED_MODEL_TIMEOUT_SECONDS: "600"
      TRAINED_MODEL_MAX_RETRIES: "1"
      TRAINED_MODEL_BACKOFF_SECONDS: "5"
      TRAINED_MODEL_BATCH_SIZE: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "lightning[app]==2.3.2" lightning-cloud==0.5.70

      - name: Restore Data and Models Cache
        uses: actions/cache/restore@v4
        with:
          path: |
            data/
            models/
            model_registry.json
          key: ${{ runner.os }}-trading-bot-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-trading-bot-

      - name: Resolve live Lightning inference URL
        run: |
          python launch_lightning_inference_studio.py \
            --config quant_platform/configs/lightning_inference_studio.yaml \
            --allow-create \
            --status-out lightning-inference-status.json
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          payload = json.loads(Path("lightning-inference-status.json").read_text())
          inference_url = str(payload.get("inference_url") or "").strip()
          if not inference_url:
              raise SystemExit(f"No live inference URL was produced: {json.dumps(payload, indent=2)}")
          with Path(os.environ["GITHUB_ENV"]).open("a") as handle:
              handle.write(f"TRAINED_MODEL_INFERENCE_URL={inference_url}\n")
          print(json.dumps({"inference_url": inference_url}, indent=2))
          PY

      - name: Run Trading Bot
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          NVIDIA_API_KEY_ID: ${{ secrets.NVIDIA_API_KEY_ID }}
          TRAINED_MODEL_API_KEY: ${{ secrets.TRAINED_MODEL_API_KEY }}
          TWELVEDATA_API_KEYS: ${{ secrets.TWELVEDATA_API_KEYS }}
          ARM_LIVE_TRADING: ${{ secrets.ARM_LIVE_TRADING }}
          LOG_LEVEL: ${{ secrets.LOG_LEVEL }}
        run: |
          python main.py daily_job

      - name: Upload artifacts (logs/reports)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bot-results
          path: |
            results/*.csv
            *.log
          retention-days: 7

      - name: Save Data and Models Cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            data/
            models/
            model_registry.json
          key: ${{ runner.os }}-trading-bot-${{ github.run_id }}
