name: Build Large Corpus (Modal CPU)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements-data.txt
      - name: Set Modal tokens
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
        run: |
          modal token set --token-id "$MODAL_TOKEN_ID" --token-secret "$MODAL_TOKEN_SECRET"
      - name: Build corpus on Modal CPU
        env:
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
          TRADINGVIEW_CSV_URL: ${{ secrets.TRADINGVIEW_CSV_URL }}
          TRADINGVIEW_CSV_PATH: ${{ secrets.TRADINGVIEW_CSV_PATH }}
        run: python scripts/modal_build_corpus.py --config configs/data_large.yaml --cpu 16 --memory 65536 --summary corpus_summary.json --progress progress.json
      - name: Upload corpus summary
        uses: actions/upload-artifact@v4
        with:
          name: corpus-summary
          path: |
            corpus_summary.json
            progress.json