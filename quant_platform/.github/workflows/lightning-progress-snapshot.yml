name: Lightning Studio Snapshot

permissions:
  contents: read

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      config_path:
        description: Path to the Lightning Studio config file
        required: false
        default: configs/lightning_run.yaml

concurrency:
  group: lightning-studio-snapshot
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install lightning-app PyYAML
      - name: Capture and heal Studio state
        env:
          GITHUB_TOKEN: ${{ github.token }}
          LIGHTNING_USERNAME: ${{ secrets.LIGHTNING_USERNAME }}
          LIGHTNING_API_KEY: ${{ secrets.LIGHTNING_API_KEY }}
        run: |
          python scripts/lightning_studio_snapshot.py \
            --config "${{ github.event.inputs.config_path || 'configs/lightning_run.yaml' }}" \
            --out lightning-studio-status.json \
            --restart-if-needed
      - name: Upload Studio snapshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lightning-studio-snapshot
          path: lightning-studio-status.json
          if-no-files-found: warn
