name: Launch Lightning Auto-Resume Studio

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      config_path:
        description: Path to the Lightning Studio config file
        required: false
        default: configs/lightning_run.yaml

concurrency:
  group: lightning-autoresume-studio
  cancel-in-progress: false

jobs:
  launch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install lightning-app PyYAML
      - name: Ensure Studio workload
        env:
          GITHUB_TOKEN: ${{ github.token }}
          LIGHTNING_USERNAME: ${{ secrets.LIGHTNING_USERNAME }}
          LIGHTNING_API_KEY: ${{ secrets.LIGHTNING_API_KEY }}
        run: |
          python scripts/lightning_studio_run.py \
            --config "${{ github.event.inputs.config_path || 'configs/lightning_run.yaml' }}" \
            --status-out lightning-studio-status.json
      - name: Upload Studio status
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lightning-studio-status
          path: lightning-studio-status.json
          if-no-files-found: warn
